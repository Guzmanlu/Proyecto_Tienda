<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIENDA</title>
    <!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="/js/indexJS.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
    <div class="container">

    <!-- Logo -->
    <a class="navbar-brand fw-bold" href="#">
      🧸 Los Trunquis
    </a>

    <!-- Botón responsive -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPeluche">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Contenido -->
    <div class="collapse navbar-collapse" id="navbarPeluche">

      <!-- Links -->
      <ul class="navbar-nav me-auto">

        <li class="nav-item">
          <a class="nav-link active" href="#">Inicio</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Peluches</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Ofertas</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Nosotros</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Contacto</a>
        </li>

      </ul>

      <!-- Buscador -->
      <form class="d-flex me-3">
        <input class="form-control me-2" type="search" placeholder="Buscar peluches">
        <button class="btn btn-light">Buscar</button>
      </form>

      <!-- Carrito -->
      <button class="btn btn-warning" type="button" data-bs-toggle="offcanvas" data-bs-target="#carrito"
        aria-controls="carrito">
        🛒 Carrito
      </button>

    </div>
    </div>
</nav>

<!-- Inicio OffCanva del Carrito -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="carrito" aria-labelledby="carritoLabel">
  <div class="offcanvas-header">
    <h2 class="offcanvas-title fw-bold" id="carritoLabel">Carrito</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body">
    <p class="fs-5 fw-bold">
      Los Productos de tu Carrito Son:
    </p>
    <div>
      <ul id="carritoList" class="list-group">
        <!-- Aquí Se Crean Dinámicamente los Productos Agregados al Carrito con JS desde el localStorage -->
      </ul>
    </div>
  </div>
  <div class="border border-top p-2">
    <div class="text-start d-inline-block">
      <p class="fs-3 fw-bold mb-0">Total:</p>
    </div>
    <div class="text-end d-inline-block float-end" id="pagoTotal">
    </div>
  </div>
  <button class="btn btn-outline-success m-3" onclick="">PAGAR</button>
</div>
<!-- Final OffCanva del Carrito -->

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
